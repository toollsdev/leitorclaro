name: leitor_claro
description: App Flutter para leitura de código de barras e cadastro de equipamentos.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  google_mlkit_barcode_scanning: ^0.13.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
